<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Rounded dark background -->
  <rect width="256" height="256" rx="40" fill="#1d1f24"/>

  <!-- 8×6 grid wireframe, centred with 32px padding -->
  <g transform="translate(32, 32)" stroke="#3a3f47" stroke-width="1.6" fill="none">
    <!-- vertical lines -->
    <line x1="0"   y1="0" x2="0"   y2="192"/>
    <line x1="24"  y1="0" x2="24"  y2="192"/>
    <line x1="48"  y1="0" x2="48"  y2="192"/>
    <line x1="72"  y1="0" x2="72"  y2="192"/>
    <line x1="96"  y1="0" x2="96"  y2="192"/>
    <line x1="120" y1="0" x2="120" y2="192"/>
    <line x1="144" y1="0" x2="144" y2="192"/>
    <line x1="168" y1="0" x2="168" y2="192"/>
    <line x1="192" y1="0" x2="192" y2="192"/>
    <!-- horizontal lines -->
    <line x1="0" y1="0"   x2="192" y2="0"/>
    <line x1="0" y1="32"  x2="192" y2="32"/>
    <line x1="0" y1="64"  x2="192" y2="64"/>
    <line x1="0" y1="96"  x2="192" y2="96"/>
    <line x1="0" y1="128" x2="192" y2="128"/>
    <line x1="0" y1="160" x2="192" y2="160"/>
    <line x1="0" y1="192" x2="192" y2="192"/>
  </g>

  <!-- Highlighted 3×2 block: cells (4,1) to (6,2) in grid coords -->
  <!-- col 4 = x=128, width 3 cells = 72; row 1 = y=64, height 2 cells = 64 -->
  <g transform="translate(32, 32)">
    <rect x="96" y="32" width="72" height="64" rx="6" fill="#3daee9"/>
    <rect x="96" y="32" width="72" height="64" rx="6" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.45"/>
  </g>
</svg>
